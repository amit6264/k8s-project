apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  namespace: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: nginx:latest
        volumeMounts:
          - name: html
            mountPath: /usr/share/nginx/html/index.html
            subPath: index.html
      volumes:
        - name: html
          configMap:
            name: ui-page
